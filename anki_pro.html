let mode=0;
let data=JSON.parse(localStorage.mem||"{}");
let today=new Date().toISOString().slice(0,10);
function weekKey(){let d=new Date();let one=new Date(d.getFullYear(),0,1);return d.getFullYear()+"-W"+Math.ceil((((d-one)/86400000)+one.getDay()+1)/7)}
if(!data.hist)data.hist={};
if(!data.hist[today])data.hist[today]=0;
if(!data.wrong)data.wrong={};
function pick(){
 let w=cards.map((c,i)=>{let x=(data.wrong[i]||0);return 1+x*3});
 let s=w.reduce((a,b)=>a+b,0),r=Math.random()*s;
 let acc=0;
 for(let i=0;i<w.length;i++){acc+=w[i];if(r<=acc)return i;}
 return 0;
}
let idx;
function next(){
 idx=pick();
 q.innerHTML=(mode?cards[idx].b:cards[idx].a);
 a.style.display='none';
 a.innerHTML="<hr>"+(mode?cards[idx].a:cards[idx].b)+(cards[idx].e?"<hr>"+cards[idx].e:"");
 let wk=weekKey(),week=0;
 for(let k in data.hist)if(k.startsWith(wk.split('-W')[0]))week+=data.hist[k];
 stats.innerHTML=`今日: ${data.hist[today]}問　今週: ${week}問　苦手登録:${Object.values(data.wrong).reduce((x,y)=>x+y,0)}`;
}
function show(){a.style.display='block';}
function grade(ok){
 data.hist[today]++;
 if(ok)data.wrong[idx]=Math.max((data.wrong[idx]||0)-1,0);
 else data.wrong[idx]=(data.wrong[idx]||0)+2;
 localStorage.mem=JSON.stringify(data);
 next();
}
document.onkeydown=e=>{if(e.code=="Space"){e.preventDefault();a.style.display=='none'?show():grade(1)}if(e.key=="x")grade(0);}
next();
</script>
